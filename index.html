<!-- JSON-LD: VideoGame -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoGame",
  "name": "Becaffeined",
  "description": "A match-three game from CR Coffee Shop in New Orleans.",
  "url": "https://game.crcoffeenola.com/",
  "applicationCategory": "GameApplication",
  "operatingSystem": "Web Browser",

    "@type": "Organization",

  }
}

<body>
<div class="app" id="app">

  <header class="app-header" role="banner">
    <div class="app-header__inner">
      <a class="app-header__brand" href="/" aria-label="Becaffeined home">
        <img class="app-header__monogram"
             src="assets/img/cr-monogram-dark.jpg"
             alt=""
             width="32" height="32" decoding="async">
        <span class="app-header__wordmark">Becaffeined</span>
      </a>
      <div class="app-header__hud" role="status" aria-live="polite">
        <button class="app-header__btn" id="btn-pause" type="button" aria-label="Pause game">Pause</button>
        <button class="app-header__btn" id="btn-mute" type="button" aria-pressed="true">Sound: on</button>
      </div>
    </div>
  </header>

  <main class="app-main" role="main">

    <section class="hud" aria-label="Game status">
      <div class="hud__cell">
        <span class="hud__label">Level</span>
        <span class="hud__value" id="hud-level">—</span>
      </div>
      <div class="hud__cell hud__cell--center">
        <span class="hud__label">Score</span>
        <span class="hud__value" id="hud-score">0</span>
      </div>
      <div class="hud__cell">
        <span class="hud__label">Time</span>
        <span class="hud__value hud__value--time" id="hud-time">—</span>
      </div>
    </section>

    <div class="progress" aria-hidden="true">
      <div class="progress__fill" id="progress-fill"></div>
    </div>

    <div class="board-frame" id="board-frame" aria-label="Game board">
      <div class="board" id="board"></div>
    </div>

  </main>

  <footer class="app-footer" role="contentinfo">
    <a href="https://crcoffeenola.com/" target="_blank" rel="noopener">
      Visit CR Coffee Shop
    </a>
  </footer>
</div>

<!-- Overlays (title, splash, game over, pause) live here. -->
<div id="overlay" class="overlay" hidden></div>

<noscript>
  <p style="padding:2rem;font-family:Georgia,serif;color:#2A2A2A">
    Becaffeined needs JavaScript. Please enable it to play.
  </p>
</noscript>

<!-- Service worker is intentionally disabled during rapid iteration. The
     sw.js file at the root is a kill-switch that auto-uninstalls any prior
     version that may be cached on a returning visitor's phone. We'll bring
     a proper offline-first SW back when the game stops changing daily. -->
<script>
  if ('serviceWorker' in navigator) {
    // Register the kill-switch once so any old SW gets evicted, then it
    // unregisters itself in its own activate handler.
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>

<!-- Game entry — ES modules. -->
<script type="module" src="js/main.js"></script>
</body>
</html>
