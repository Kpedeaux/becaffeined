<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="CR Coffee paper cup">
  <!-- Shadow on table -->
  <ellipse cx="100" cy="184" rx="44" ry="6" fill="rgba(23,23,23,0.18)"/>

  <!-- White paper cup body, slightly tapered (wider at top, narrower at base) -->
  <path d="M 58 78 L 66 178 Q 66 182 70 182 L 130 182 Q 134 182 134 178 L 142 78 Z"
        fill="#f5efe2" stroke="#1d1d1d" stroke-width="4" stroke-linejoin="round"/>

  <!-- Subtle inner-rim line where the lid meets the cup -->
  <path d="M 60 80 Q 100 86 140 80" fill="none" stroke="#1d1d1d" stroke-width="1.6" opacity="0.45"/>

  <!-- Black paper sleeve covering middle of cup, follows the taper -->
  <path d="M 60 100 L 64 154 Q 64 156 66 156 L 134 156 Q 136 156 136 154 L 140 100 Z"
        fill="#1d1d1d"/>

  <!-- White stitched lines along sleeve edges -->
  <path d="M 60.5 105 Q 100 108 139.5 105" fill="none" stroke="#f5efe2" stroke-width="1.2" opacity="0.85"/>
  <path d="M 64.5 150 Q 100 153 135.5 150" fill="none" stroke="#f5efe2" stroke-width="1.2" opacity="0.85"/>

  <!-- "CR" wordmark on sleeve -->
  <text x="100" y="138" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="400"
        fill="#f5efe2" letter-spacing="3">CR</text>

  <!-- "COFFEE SHOP" subtitle on sleeve -->
  <text x="100" y="148" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="5.5" font-weight="700"
        fill="#f5efe2" letter-spacing="1.2">COFFEE SHOP</text>

  <!-- Black lid: bottom rim band -->
  <path d="M 56 70 L 144 70 L 142 82 Q 142 84 140 84 L 60 84 Q 58 84 58 82 Z"
        fill="#0f0f0f" stroke="#1d1d1d" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- Black lid: domed top -->
  <path d="M 60 70 Q 60 36 100 34 Q 140 36 140 70 Z"
        fill="#1d1d1d" stroke="#1d1d1d" stroke-width="3" stroke-linejoin="round"/>

  <!-- Lid highlight (top-left curve, suggesting plastic sheen) -->
  <path d="M 70 52 Q 88 44 104 42" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Sip-hole shadow on top of lid -->
  <ellipse cx="100" cy="40" rx="9" ry="2" fill="#000" opacity="0.55"/>
</svg>
