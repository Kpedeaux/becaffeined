<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Iced CR Cold Brew">
  <defs>
    <linearGradient id="icr-coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a2f1a"/>
      <stop offset="55%" stop-color="#8b5a30"/>
      <stop offset="100%" stop-color="#3a1d0e"/>
    </linearGradient>
    <linearGradient id="icr-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.30)"/>
    </linearGradient>
  </defs>

  <!-- Glass shadow on table -->
  <ellipse cx="100" cy="178" rx="48" ry="6" fill="rgba(23,23,23,0.18)"/>

  <!-- Glass body (slight taper) -->
  <path d="M 56 36 L 56 168 Q 56 174 62 174 L 138 174 Q 144 174 144 168 L 144 36 Z"
        fill="#e9e3da" stroke="#1d1d1d" stroke-width="4" stroke-linejoin="round"/>

  <!-- Coffee inside (top layer) -->
  <path d="M 60 50 L 60 168 Q 60 170 62 170 L 138 170 Q 140 170 140 168 L 140 50 Z"
        fill="url(#icr-coffee)"/>

  <!-- Caramel swirls -->
  <path d="M 70 70 Q 100 55 130 75 Q 110 90 90 80 Q 75 88 70 70 Z" fill="#c68b4b" opacity="0.85"/>
  <path d="M 68 110 Q 95 100 130 118 Q 105 130 88 122 Q 76 128 68 110 Z" fill="#d49a5a" opacity="0.7"/>
  <path d="M 72 145 Q 98 138 132 152 Q 110 160 90 154 Q 78 158 72 145 Z" fill="#a86b32" opacity="0.6"/>

  <!-- Ice cubes -->
  <rect x="68" y="46" width="22" height="22" rx="3" fill="rgba(255,255,255,0.7)" stroke="#1d1d1d" stroke-width="2"/>
  <rect x="96" y="40" width="20" height="20" rx="3" fill="rgba(255,255,255,0.55)" stroke="#1d1d1d" stroke-width="2"/>
  <rect x="120" y="50" width="20" height="20" rx="3" fill="rgba(255,255,255,0.65)" stroke="#1d1d1d" stroke-width="2"/>

  <!-- Glass sheen -->
  <rect x="60" y="40" width="80" height="130" fill="url(#icr-glass)" opacity="0.5"/>

  <!-- CR mark on glass front -->
  <text x="100" y="125" text-anchor="middle"
        font-family="Georgia, serif" font-size="34" font-weight="700"
        fill="#1d1d1d" opacity="0.85" letter-spacing="2">CR</text>

  <!-- Glass rim -->
  <ellipse cx="100" cy="36" rx="44" ry="6" fill="#cfc7b9" stroke="#1d1d1d" stroke-width="4"/>
</svg>
