<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Bayou Beast">
  <defs>
    <linearGradient id="bb-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d99a4d"/>
      <stop offset="35%" stop-color="#c5b56a"/>
      <stop offset="55%" stop-color="#a8d472"/>
      <stop offset="100%" stop-color="#3da256"/>
    </linearGradient>
    <linearGradient id="bb-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.25)"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="180" rx="48" ry="6" fill="rgba(23,23,23,0.18)"/>

  <!-- Pint glass (slightly wider at top) -->
  <path d="M 56 38 L 62 174 Q 62 178 66 178 L 134 178 Q 138 178 138 174 L 144 38 Z"
        fill="#e9e3da" stroke="#1d1d1d" stroke-width="4" stroke-linejoin="round"/>

  <!-- Drink fill (ombre amber-to-green) -->
  <path d="M 60 48 L 64 172 Q 64 174 66 174 L 134 174 Q 136 174 136 172 L 140 48 Z"
        fill="url(#bb-fill)"/>

  <!-- Ice cubes at top -->
  <rect x="68" y="46" width="18" height="18" rx="2.5" fill="rgba(255,255,255,0.65)" stroke="#1d1d1d" stroke-width="2"/>
  <rect x="92" y="42" width="20" height="20" rx="2.5" fill="rgba(255,255,255,0.55)" stroke="#1d1d1d" stroke-width="2"/>
  <rect x="116" y="48" width="18" height="18" rx="2.5" fill="rgba(255,255,255,0.6)" stroke="#1d1d1d" stroke-width="2"/>

  <!-- Bayou Beast silhouette (hand-drawn, simplified) -->
  <g fill="#1d1d1d" stroke="#1d1d1d" stroke-width="1.2" stroke-linejoin="round">
    <!-- Head with horns -->
    <path d="M 92 80
             L 88 68 L 92 70 L 94 76
             L 100 72 L 106 76 L 108 70 L 112 68 L 108 80
             Q 112 84 110 90 Q 100 94 90 90 Q 88 84 92 80 Z"/>
    <!-- Eyes (white dots cut out) -->
    <circle cx="95" cy="82" r="1.2" fill="#e9e3da"/>
    <circle cx="105" cy="82" r="1.2" fill="#e9e3da"/>
    <!-- Body torso -->
    <path d="M 88 92 L 84 116 L 92 120 L 92 144 L 86 158
             L 92 160 L 96 144 L 100 144 L 104 144 L 108 160
             L 114 158 L 108 144 L 108 120 L 116 116 L 112 92
             Q 100 96 88 92 Z"/>
    <!-- Left arm with staff -->
    <path d="M 84 100 L 76 130 L 78 132 L 86 104 Z"/>
    <line x1="76" y1="92" x2="76" y2="148" stroke-width="3"/>
    <!-- Right arm -->
    <path d="M 116 100 L 124 124 L 122 130 L 114 106 Z"/>
  </g>

  <!-- Glass sheen -->
  <rect x="62" y="44" width="80" height="135" fill="url(#bb-glass)" opacity="0.5"/>

  <!-- Glass rim -->
  <ellipse cx="100" cy="38" rx="44" ry="6" fill="#d3cabb" stroke="#1d1d1d" stroke-width="4"/>
</svg>
