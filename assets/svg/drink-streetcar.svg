<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Streetcar Tumbler">
  <defs>
    <linearGradient id="sc-coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0d12"/>
      <stop offset="100%" stop-color="#1a0507"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="184" rx="46" ry="6" fill="rgba(23,23,23,0.18)"/>

  <!-- Tumbler body -->
  <path d="M 58 56 L 60 178 Q 60 182 64 182 L 136 182 Q 140 182 140 178 L 142 56 Z"
        fill="#efe9de" stroke="#1d1d1d" stroke-width="4" stroke-linejoin="round"/>

  <!-- Cold brew inside -->
  <path d="M 62 60 L 64 174 Q 64 176 66 176 L 134 176 Q 136 176 136 174 L 138 60 Z"
        fill="url(#sc-coffee)"/>

  <!-- Streetcar etching (white line drawing on glass) -->
  <g stroke="#f5efe2" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <!-- Body of streetcar -->
    <rect x="74" y="100" width="56" height="34" rx="2"/>
    <!-- Roof -->
    <path d="M 70 100 L 134 100"/>
    <!-- Trolley pole -->
    <path d="M 102 100 L 102 86 L 116 80"/>
    <!-- Windows -->
    <line x1="84" y1="105" x2="84" y2="120"/>
    <line x1="96" y1="105" x2="96" y2="120"/>
    <line x1="108" y1="105" x2="108" y2="120"/>
    <line x1="120" y1="105" x2="120" y2="120"/>
    <!-- Wheels -->
    <circle cx="86" cy="138" r="4"/>
    <circle cx="118" cy="138" r="4"/>
    <!-- Track lines -->
    <path d="M 70 145 L 134 145"/>
    <path d="M 70 148 L 134 148"/>
  </g>

  <!-- Red lid -->
  <path d="M 56 50 Q 56 38 64 38 L 136 38 Q 144 38 144 50 L 144 60 Q 144 64 140 64 L 60 64 Q 56 64 56 60 Z"
        fill="#A52639" stroke="#1d1d1d" stroke-width="4" stroke-linejoin="round"/>
  <!-- Lid highlight -->
  <path d="M 64 44 L 130 44" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>

  <!-- Glass sheen -->
  <path d="M 66 68 L 70 170" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>
</svg>
